<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro de Posição</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      displayfind: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, textarea, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    .coords {
      background: #eef;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Posição (Motorista)</h2>

  <div class="coords">
    <strong>Posição atual (GPS):</strong><br>
    Lat: <span id="lat">-</span><br>
    Lng: <span id="lng">-</span>
  </div>

  <!-- NOVO: COORDENADA MANUAL -->
  <label>Latitude manual (opcional)</label>
  <input type="number" step="0.000001" id="lat_manual" min="-90" max="90">

  <label>Longitude manual (opcional)</label>
  <input type="number" step="0.000001" id="lng_manual" min="-180" max="180">

  <label>altura_esquerda (m)</label>
  <input type="number" step="0.01" id="altura_esquerda">

  <label>altura_centro (m)</label>
  <input type="number" step="0.01" id="altura_centro">

  <label>altura_direita (m)</label>
  <input type="number" step="0.01" id="altura_direita">

  <label>Observação</label>
  <textarea id="obs" rows="3"></textarea>
  
  <label>Fonte (EVG / referência)</label>
  <input type="text" id="fonte" placeholder="Ex: EVG123, nome do arquivo, etc.">
  
  <button onclick="enviarDados()">Enviar Registro</button>

  <div class="status" id="status"></div>
</div>

<script>
let latitude = null;
let longitude = null;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEgBQkLh8I450WI2ZLECDAUezo_1iQetUMt17KdcrkZoHF9H4A2dRZbwHbAiRxULtulw/exec";

/* ===== GEOLOCALIZAÇÃO ===== */
function iniciarLocalizacao() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada.");
    return;
  }

  navigator.geolocation.watchPosition(
    (pos) => {
      latitude = pos.coords.latitude;
      longitude = pos.coords.longitude;

      document.getElementById("lat").textContent = latitude.toFixed(6);
      document.getElementById("lng").textContent = longitude.toFixed(6);
    },
    (err) => {
      alert("Erro ao obter localização: " + err.message);
    },
    { enableHighAccuracy: true }
  );
}

/* ===== ENVIO ===== */
async function enviarDados() {

  const latManual = document.getElementById("lat_manual").value;
  const lngManual = document.getElementById("lng_manual").value;

  let latFinal = latitude;
  let lngFinal = longitude;

  // Prioridade: coordenada manual
  if (latManual && lngManual) {
    latFinal = parseFloat(latManual);
    lngFinal = parseFloat(lngManual);
  } else {
    if (latitude === null || longitude === null) {
      alert("Aguardando GPS ou preencha coordenadas manualmente.");
      return;
    }
  }

  const altura_esquerda = document.getElementById("altura_esquerda").value;
  const altura_centro = document.getElementById("altura_centro").value;
  const altura_direita = document.getElementById("altura_direita").value;
  const obs = document.getElementById("obs").value;
  const fonte = document.getElementById("fonte").value;
  
  if (!altura_esquerda || !altura_centro || !altura_direita) {
    alert("Preencha as três alturas.");
    return;
  }

  const dados = {
    data_hora: new Date().toISOString(),
    latitude: latFinal,
    longitude: lngFinal,
    altura_esquerda: altura_esquerda,
    altura_centro: altura_centro,
    altura_direita: altura_direita,
    observacao: obs,
    fonte: fonte,
  };

  document.getElementById("status").textContent = "Enviando...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(dados),
      mode: "no-cors"
    });

    document.getElementById("status").textContent = "✅ Enviado com sucesso!";

    // Limpa campos
    document.getElementById("altura_esquerda").value = "";
    document.getElementById("altura_centro").value = "";
    document.getElementById("altura_direita").value = "";
    document.getElementById("obs").value = "";
    document.getElementById("lat_manual").value = "";
    document.getElementById("lng_manual").value = "";
    document.getElementById("fonte").value = "";
    
  } catch (erro) {
    console.error(erro);
    document.getElementById("status").textContent = "❌ Erro ao enviar";
  }
}

/* ===== INICIALIZA ===== */
iniciarLocalizacao();
</script>

</body>
</html>
