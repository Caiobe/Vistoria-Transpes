<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro de Posição</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, textarea, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    .coords {
      background: #eef;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
    
    .upload-box {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
    }

    .upload-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #555;
    }

    .file-meta {
      margin-top: 8px;
      font-size: 13px;
      color: #333;
    }

    .ocr-log {
      margin-top: 8px;
      background: #f0f8ff;
      border: 1px solid #d2e6ff;
      border-radius: 5px;
      padding: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 130px;
      overflow: auto;
      display: none;
    }

    .resultados {
      margin-top: 10px;
      display: none;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
    }

    .resultados label {
      margin-top: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Posição (Motorista)</h2>

  <div class="coords">
    <strong>Posição atual (GPS):</strong><br>
    Lat: <span id="lat">-</span><br>
    Lng: <span id="lng">-</span>
  </div>

  <!-- NOVO: COORDENADA MANUAL -->
  <label>Latitude manual (opcional)</label>
  <input type="number" step="0.000001" id="lat_manual" min="-90" max="90">

  <label>Longitude manual (opcional)</label>
  <input type="number" step="0.000001" id="lng_manual" min="-180" max="180">

  <label>Altura 1 (m)</label>
  <input type="number" step="0.01" id="altura1">

  <label>Altura 2 (m)</label>
  <input type="number" step="0.01" id="altura2">

  <label>Altura 3 (m)</label>
  <input type="number" step="0.01" id="altura3">
  
  <div class="upload-box">
    <label for="arquivo_imagem">Upload de imagem ou PDF (preencher automático)</label>
    <input type="file" id="arquivo_imagem" accept="image/*,.pdf,application/pdf">
    <button type="button" id="btnLerImagem">Ler arquivo</button>
    <div class="upload-hint">
      Dica: para PDF com várias páginas, cada página é lida como um local separado.
    </div>
    <div class="file-meta" id="fileMeta">Nenhum arquivo selecionado.</div>
    <div class="ocr-log" id="ocrLog"></div>
    <div class="resultados" id="resultadosOCR">
      <label for="registroDetectado">Locais detectados</label>
      <select id="registroDetectado"></select>
      <button type="button" id="btnAplicarRegistro">Aplicar local selecionado</button>
    </div>
  </div>
  
  <label>Observação</label>
  <textarea id="obs" rows="3"></textarea>
  
  <label>Fonte (EVG / referência)</label>
  <input type="text" id="fonte" placeholder="Ex: EVG123, nome do arquivo, etc.">
  
  <button onclick="enviarDados()">Enviar Registro</button>

  <div class="status" id="status"></div>
</div>

<script>
let latitude = null;
let longitude = null;
let imagemSelecionada = null;
let registrosDetectados = [];
let arquivoAtualEhPDF = false;
  
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEgBQkLh8I450WI2ZLECDAUezo_1iQetUMt17KdcrkZoHF9H4A2dRZbwHbAiRxULtulw/exec";
  
const fileInput = document.getElementById("arquivo_imagem");
const fileMeta = document.getElementById("fileMeta");
const btnLerImagem = document.getElementById("btnLerImagem");
const ocrLog = document.getElementById("ocrLog");
const resultadosOCR = document.getElementById("resultadosOCR");
const registroDetectado = document.getElementById("registroDetectado");
const btnAplicarRegistro = document.getElementById("btnAplicarRegistro");

fileInput.addEventListener("change", (event) => {
  const [arquivo] = event.target.files || [];
  imagemSelecionada = arquivo || null;

  if (!imagemSelecionada) {
    fileMeta.textContent = "Nenhum arquivo selecionado.";
    return;
  }

  const tamanhoKb = (imagemSelecionada.size / 1024).toFixed(1);
  fileMeta.textContent = `${imagemSelecionada.name} (${tamanhoKb} KB)`;
  resultadosOCR.style.display = "none";
  registrosDetectados = [];
});

btnLerImagem.addEventListener("click", async () => {
  if (!imagemSelecionada) {
    alert("Selecione uma imagem antes de ler.");
    return;
  }

  try {
    ocrLog.style.display = "block";
    ocrLog.textContent = "Iniciando OCR...";
    resultadosOCR.style.display = "none";
    registrosDetectados = [];

    const paginasTexto = await lerArquivoEmPaginas(imagemSelecionada, (msg) => {
      ocrLog.textContent = msg;
    });

    registrosDetectados = paginasTexto.flatMap((item) =>
      extrairRegistrosDaPagina(item.texto, item.pagina)
    ).filter((registro) =>
      registro.alturas.LE || registro.alturas.LC || registro.alturas.LD
    );

    if (!registrosDetectados.length) {
      ocrLog.textContent = "OCR finalizado, mas nenhum local válido foi identificado.";
      alert("Nenhum local com alturas detectáveis foi encontrado no arquivo.");
      return;
    }

    popularSelectRegistros(registrosDetectados);
    resultadosOCR.style.display = "block";
    aplicarRegistroSelecionado();
  } catch (erro) {
    console.error(erro);
    alert("Não foi possível ler o arquivo. Tente um arquivo mais nítido.");
    ocrLog.textContent = "Erro no OCR.";
  }
});

btnAplicarRegistro.addEventListener("click", () => {
  aplicarRegistroSelecionado();
});

registroDetectado.addEventListener("change", () => {
  aplicarRegistroSelecionado();
});

/* ===== GEOLOCALIZAÇÃO ===== */
function iniciarLocalizacao() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada.");
    return;
  }

  navigator.geolocation.watchPosition(
    (pos) => {
      latitude = pos.coords.latitude;
      longitude = pos.coords.longitude;

      document.getElementById("lat").textContent = latitude.toFixed(6);
      document.getElementById("lng").textContent = longitude.toFixed(6);
    },
    (err) => {
      alert("Erro ao obter localização: " + err.message);
    },
    { enableHighAccuracy: true }
  );
}

async function executarOCR(arquivo, progressoCallback) {
  await aguardarBiblioteca("Tesseract", 15000);
  }

  const resultado = await window.Tesseract.recognize(arquivo, "por+eng", {
    logger: (info) => {
      if (info.status && typeof info.progress === "number") {
        const pct = Math.round(info.progress * 100);
        progressoCallback(`${info.status}: ${pct}%`);
      }
    }
  });

  progressoCallback("OCR finalizado. Processando texto...");
  return resultado.data.text || "";
}

async function lerArquivoEmPaginas(arquivo, progressoCallback) {
  const nome = (arquivo.name || "").toLowerCase();
  const tipo = arquivo.type || "";
  const isPDF = nome.endsWith(".pdf") || tipo === "application/pdf";

  if (!isPDF) {
    const texto = await executarOCR(arquivo, progressoCallback);
    return [{ pagina: 1, texto }];
  }

  await aguardarBiblioteca("pdfjsLib", 15000);

  const bytes = new Uint8Array(await arquivo.arrayBuffer());
  const pdf = await window.pdfjsLib.getDocument({ data: bytes }).promise;
  const paginas = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    progressoCallback(`Renderizando página ${i}/${pdf.numPages}...`);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d", { willReadFrequently: true });
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);

    await page.render({ canvasContext: context, viewport }).promise;
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    if (!blob) continue;

    const pseudoArquivo = new File([blob], `pagina-${i}.png`, { type: "image/png" });
    const texto = await executarOCR(pseudoArquivo, (msg) => {
      progressoCallback(`Página ${i}/${pdf.numPages}: ${msg}`);
    });

    paginas.push({ pagina: i, texto });
  }

  return paginas;
}

async function aguardarBiblioteca(nomeGlobal, timeoutMs = 10000) {
  const inicio = Date.now();
  while (!window[nomeGlobal]) {
    if (Date.now() - inicio > timeoutMs) {
      throw new Error(`Biblioteca ${nomeGlobal} não carregou no tempo esperado.`);
    }
    await new Promise((r) => setTimeout(r, 120));
  }
}
  
function extrairDadosDaImagem(textoBruto) {
  const texto = normalizarTexto(textoBruto);
  const alturas = extrairAlturas(texto);
  const coordenadas = extrairCoordenadas(texto);
  const rodoviaKm = extrairRodoviaKm(texto);
  
  return {
    alturas,
    coordenadas,
    rodoviaKm,
    texto
  };
  
function extrairRegistrosDaPagina(textoBruto, pagina) {
  const texto = normalizarTexto(textoBruto);
  const coords = extrairTodasCoordenadasComIndice(texto);

  if (!coords.length) {
    return [{ pagina, ...extrairDadosDaImagem(texto) }];
  }

  const registros = [];

  for (let i = 0; i < coords.length; i++) {
    const atual = coords[i];
    const proxima = coords[i + 1];
    const inicio = Math.max(0, atual.index - 120);
    const fim = proxima ? proxima.index : texto.length;
    const bloco = texto.slice(inicio, fim);
    
    const alturas = extrairAlturas(bloco);
    const rodoviaKm = extrairRodoviaKm(bloco) || extrairRodoviaKm(texto);
    
    registros.push({
      pagina,
      alturas: extrairAlturas(bloco),
      coordenadas: {
        latitude: atual.latitude,
        longitude: atual.longitude
      },
      rodoviaKm: extrairRodoviaKm(bloco) || extrairRodoviaKm(texto),
      texto: bloco
    });
  }

  return registros;
}
}

function normalizarTexto(texto) {
  return texto
    .replace(/\r/g, "\n")
    .replace(/\s+/g, " ")
    .trim();
}

function extrairAlturas(texto) {
  const grupos = {};
  const regex = /\b(L[EDC])\s*[:\-]?\s*([0-9]+(?:[.,][0-9]+)?)\s*m?\b/gi;
  let match;

  while ((match = regex.exec(texto)) !== null) {
    const chave = match[1].toUpperCase();
    const valor = parseFloat(match[2].replace(",", "."));
    if (!Number.isNaN(valor)) {
      grupos[chave] = valor;
    }
  }

  const fallback = texto.match(/\b([0-9]+(?:[.,][0-9]+)?)\s*m?\b/g) || [];
  const valores = fallback
    .map((v) => parseFloat(v.replace(",", ".")))
    .filter((n) => n >= 2 && n <= 12);

  if (!grupos.LE && valores[0]) grupos.LE = valores[0];
  if (!grupos.LC && valores[1]) grupos.LC = valores[1];
  if (!grupos.LD && valores[2]) grupos.LD = valores[2];

  return grupos;
}

function extrairCoordenadas(texto) {
  const todas = extrairTodasCoordenadasComIndice(texto);
  if (!todas.length) return null;
  return {
    latitude: todas[0].latitude,
    longitude: todas[0].longitude
  };
}
  
function extrairTodasCoordenadasComIndice(texto) {
  const regex = /([0-9]{1,2}[.,][0-9]{3,8})\s*([NS])[^0-9A-Z]*([0-9]{1,3}[.,][0-9]{3,8})\s*([EWO])/gi;
  const resultados = [];
  let match;

  while ((match = regex.exec(texto)) !== null) {
    const latBase = parseFloat(match[1].replace(",", "."));
    const latHemi = (match[2] || "").toUpperCase();
    const lngBase = parseFloat(match[3].replace(",", "."));
    const lngHemiBruto = (match[4] || "").toUpperCase();
    const lngHemi = lngHemiBruto === "O" ? "W" : lngHemiBruto; // OCR comum em pt-BR: Oeste -> O

    if (Number.isNaN(latBase) || Number.isNaN(lngBase)) continue;
    if (latBase > 90 || lngBase > 180) continue;

    resultados.push({
      index: match.index,
      latitude: latHemi === "S" ? -latBase : latBase,
      longitude: lngHemi === "W" ? -lngBase : lngBase
    });
  }

  return resultados;
}

function extrairRodoviaKm(texto) {
  const regex = /\b(BR)\s*[- ]?([0-9]{2,3}).*?\b(km)\s*([0-9]+(?:[.,][0-9]+)?(?:\s*[-–]\s*[A-Za-z]+)?)/i;
  const match = texto.match(regex);
  if (!match) return null;
  return `${match[1].toUpperCase()} ${match[2]} | km ${match[4].replace(/\s+/g, "")}`;
}

function preencherCampos(dados) {
  const { alturas, coordenadas, rodoviaKm } = dados;
  let preenchidos = 0;

  if (alturas.LE) {
    document.getElementById("altura1").value = alturas.LE.toFixed(2);
    preenchidos += 1;
  }
  if (alturas.LC) {
    document.getElementById("altura2").value = alturas.LC.toFixed(2);
    preenchidos += 1;
  }
  if (alturas.LD) {
    document.getElementById("altura3").value = alturas.LD.toFixed(2);
    preenchidos += 1;
  }

  if (coordenadas) {
    document.getElementById("lat_manual").value = coordenadas.latitude.toFixed(6);
    document.getElementById("lng_manual").value = coordenadas.longitude.toFixed(6);
  }

  if (rodoviaKm) {
    const obsAtual = document.getElementById("obs").value.trim();
    const prefixo = `[${rodoviaKm}]`;
    if (!obsAtual.includes(prefixo)) {
      document.getElementById("obs").value = obsAtual ? `${prefixo} ${obsAtual}` : prefixo;
    }
  }

  ocrLog.textContent = `OCR finalizado.\nAlturas encontradas: ${preenchidos}/3` +
    (coordenadas ? "\nCoordenadas também foram extraídas." : "\nCoordenadas não identificadas.") +
    (rodoviaKm ? `\nRodovia/KM: ${rodoviaKm}` : "\nRodovia/KM não identificado.");

  if (preenchidos === 0) {
    alert("Não foi possível identificar as alturas. Revise a imagem.");
  }
}

function popularSelectRegistros(registros) {
  registroDetectado.innerHTML = "";
  registros.forEach((registro, idx) => {
    const option = document.createElement("option");
    const marcadorKm = registro.rodoviaKm || "BR/KM não identificado";
    const coords = registro.coordenadas
      ? `${registro.coordenadas.latitude.toFixed(4)}, ${registro.coordenadas.longitude.toFixed(4)}`
      : "coord. não identificada";
    option.value = String(idx);
    option.textContent = `Página ${registro.pagina}: ${marcadorKm} | ${coords}`;
    registroDetectado.appendChild(option);
  });
}

function aplicarRegistroSelecionado() {
  const idx = Number(registroDetectado.value || 0);
  const registro = registrosDetectados[idx];
  if (!registro) return;
  preencherCampos(registro);
}

/* ===== ENVIO ===== */
async function enviarDados() {
  if (arquivoAtualEhPDF && registrosDetectados.length) {
    await enviarLoteDetectado();
    return;
  }
  
  const latManual = document.getElementById("lat_manual").value;
  const lngManual = document.getElementById("lng_manual").value;

  let latFinal = latitude;
  let lngFinal = longitude;

  // Prioridade: coordenada manual
  if (latManual && lngManual) {
    latFinal = parseFloat(latManual);
    lngFinal = parseFloat(lngManual);
  } else {
    if (latitude === null || longitude === null) {
      alert("Aguardando GPS ou preencha coordenadas manualmente.");
      return;
    }
  }

  const altura1 = document.getElementById("altura1").value;
  const altura2 = document.getElementById("altura2").value;
  const altura3 = document.getElementById("altura3").value;
  const obs = document.getElementById("obs").value;
  const fonte = fonteInput.value.trim();
  
  if (!altura1 || !altura2 || !altura3) {
    alert("Preencha as três alturas.");
    return;
  }

  const dados = {
    data_hora: new Date().toISOString(),
    latitude: latFinal,
    longitude: lngFinal,
    altura1: altura1,
    altura2: altura2,
    altura3: altura3,
    observacao: obs,
    fonte: fonte
  };

  document.getElementById("status").textContent = "Enviando...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(dados),
      mode: "no-cors"
    });

    document.getElementById("status").textContent = "✅ Enviado com sucesso!";

    // Limpa campos
    document.getElementById("altura1").value = "";
    document.getElementById("altura2").value = "";
    document.getElementById("altura3").value = "";
    document.getElementById("obs").value = "";
    document.getElementById("lat_manual").value = "";
    document.getElementById("lng_manual").value = "";
    document.getElementById("fonte").value = "";
    fonteInput.value = "";
    
  } catch (erro) {
    console.error(erro);
    document.getElementById("status").textContent = "❌ Erro ao enviar";
  }
}

function validarRegistroParaEnvio(registro) {
  const { alturas, coordenadas } = registro;
  if (!alturas || !coordenadas) return false;
  if ([alturas.LE, alturas.LC, alturas.LD].some((v) => !v || Number.isNaN(v))) return false;
  if (typeof coordenadas.latitude !== "number" || typeof coordenadas.longitude !== "number") return false;
  return true;
}

async function enviarLoteDetectado() {
  const validos = registrosDetectados.filter(validarRegistroParaEnvio);
  const ignorados = registrosDetectados.length - validos.length;

  if (!validos.length) {
    alert("Nenhum registro válido para envio em lote.");
    return;
  }

  document.getElementById("status").textContent = `Enviando ${validos.length} registros...`;
  let enviados = 0;
  let falhas = 0;

  for (const registro of validos) {
    const obsAtual = document.getElementById("obs").value.trim();
    const prefixo = registro.rodoviaKm ? `[${registro.rodoviaKm}]` : `[Página ${registro.pagina}]`;
    const observacao = obsAtual ? `${prefixo} ${obsAtual}` : prefixo;
    const fonte = fonteInput.value.trim();

    const payload = {
      data_hora: new Date().toISOString(),
      latitude: registro.coordenadas.latitude,
      longitude: registro.coordenadas.longitude,
      altura1: registro.alturas.LE.toFixed(2),
      altura2: registro.alturas.LC.toFixed(2),
      altura3: registro.alturas.LD.toFixed(2),
      observacao: observacao,
      fonte: fonte
    };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload),
        mode: "no-cors"
      });
      enviados += 1;
    } catch (erro) {
      falhas += 1;
      console.error("Falha ao enviar registro do lote:", erro);
    }
    document.getElementById("status").textContent = `Enviando lote... ${enviados}/${validos.length}`;
  }

  document.getElementById("status").textContent =
    `✅ Lote concluído: enviados ${enviados}/${validos.length}` +
    (falhas ? ` | falhas: ${falhas}` : "") +
    (ignorados ? ` | ignorados: ${ignorados}` : "");
}

function executarAutoTestesParser() {
  const amostra = `
    20,4196S 43,8829W BR 040, km 597,0-Sul Altura viaduto: LE 6,01m, LC 6,50m, LD 7,00m
    20,4200S 43,8831W BR 040, km 598,0-Norte Altura viaduto: LE 5,90m, LC 6,20m, LD 6,80m
  `;

  const coords = extrairTodasCoordenadasComIndice(amostra);
  const registros = extrairRegistrosDaPagina(amostra, 1);
  const km = extrairRodoviaKm(amostra);

  console.assert(coords.length >= 2, "Teste parser: deve encontrar 2 coordenadas.");
  console.assert(registros.length >= 2, "Teste parser: deve montar 2 registros.");
  console.assert(!!km, "Teste parser: deve identificar BR/KM.");
}

/* ===== INICIALIZA ===== */
iniciarLocalizacao();
executarAutoTestesParser();
</script>
<script type="module">
  import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs";
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";
  window.pdfjsLib = pdfjsLib;
</script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</body>
</html>
